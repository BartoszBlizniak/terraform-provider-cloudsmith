name: Acceptance

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    concurrency:
      group: global
    timeout-minutes: 60
    steps:
    - name: Install Go 1.19
      uses: actions/setup-go@v3
      with:
        go-version: 1.19
      id: go

    - uses: actions/checkout@v3

    - name: Run tests
      run: |
        TF_ACC=1 go test -v ./... -parallel=64 -timeout=30m
      env:
        CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        CLOUDSMITH_NAMESPACE: ${{ vars.CLOUDSMITH_NAMESPACE }}
